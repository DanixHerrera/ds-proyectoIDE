<!-- Login View -->
<div class="auth-container">
    <h1 class="auth-title">Crystal Portal</h1>

    <div id="alertContainer"></div>
    <div class="auth-form">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Correo Electrónico</label>
                <input type="email" id="loginEmail" placeholder="" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Contraseña</label>
                <input type="password" id="loginPassword" placeholder="" required>
            </div>
            <button type="submit" class="btn-auth">Iniciar Sesión</button>
        </form>
        <button class="btn-back" onclick="app.navigate('welcome')">Volver</button>
        <div class="auth-toggle">
            ¿No tienes cuenta? <a onclick="app.goToRegister()">Registrarse</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email && !password) {
            app.showAlert('Debes completar correo y contraseña', 'error');
            return;
        }

        if (!email) {
            app.showAlert('Falta completar el correo electrónico', 'error');
            return;
        }

        if (!password) {
            app.showAlert('Falta completar la contraseña', 'error');
            return;
        }

        auth.login(email, password);
    });
</script>
