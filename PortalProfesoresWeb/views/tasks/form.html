<!-- Task Form View -->
<div class="dashboard-container">
    <div id="alertContainer"></div>

    <div class="form-container">
        <h2 id="taskFormTitle">Crear Nueva Tarea</h2>
        <form id="createTaskForm">
            <div class="form-group-custom">
                <label for="taskTitle">Título de la Tarea *</label>
                <input type="text" id="taskTitle" required>
            </div>

            <div class="form-group-custom">
                <label for="taskCourse">Curso *</label>
                <select id="taskCourse" required>
                    <option value="">Seleccionar curso</option>
                </select>
            </div>

            <div class="form-group-custom">
                <label for="taskGroup">Grupo *</label>
                <select id="taskGroup" required>
                    <option value="">Seleccionar grupo</option>
                </select>
            </div>

            <div class="form-group-custom">
                <label for="taskDescription">Descripción *</label>
                <textarea id="taskDescription" required></textarea>
            </div>

            <div class="form-group-custom">
                <label for="taskAttachments">Adjuntar archivo</label>
                <input type="file" id="taskAttachments">
                <ul id="attachmentsList" class="attachments-list"></ul>
            </div>

            <div class="form-group-custom">
                <label for="taskDueDate">Fecha de Vencimiento *</label>
                <input type="datetime-local" id="taskDueDate" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitTaskBtn">Crear Tarea</button>
                <button type="button" class="btn-cancel" onclick="app.navigate('tasks')">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const currentUser = auth.getCurrentUser();
    if (currentUser) {
        const userNameEl = document.getElementById('userName');
        if (userNameEl) userNameEl.textContent = currentUser.name;
        const navName = document.getElementById('navUserName');
        if (navName) navName.textContent = currentUser.name;
        const avatar = document.querySelector('.user-avatar');
        if (avatar) avatar.textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'P';
    }

    async function loadCoursesForTaskSelect() {
        const courses = await courses_module.getUserCourses();
        const select = document.getElementById('taskCourse');
        select.innerHTML = '<option value="">Seleccionar curso</option>' +
            courses.map(course => `<option value="${course.id}">${course.name}</option>`).join('');
    }

    async function loadGroupsForTaskSelect(courseId) {
        const allGroups = await groups_module.getUserGroups();
        const filtered = courseId
            ? allGroups.filter(g => g.courseId == courseId)
            : allGroups;
        const select = document.getElementById('taskGroup');
        select.innerHTML = '<option value="">Seleccionar grupo</option>' +
            filtered.map(group => `<option value="${group.id}">${group.name}</option>`).join('');
    }

    (async () => {
        await loadCoursesForTaskSelect();
        await loadGroupsForTaskSelect();
    })();

    document.getElementById('taskCourse').addEventListener('change', function() {
        loadGroupsForTaskSelect(this.value);
    });

    const taskParams = app.currentParams || null;
    const editTaskId = taskParams ? parseInt(taskParams.id || taskParams) : null;
    const taskTitle = document.getElementById('taskFormTitle');
    const taskSubmit = document.getElementById('submitTaskBtn');

    let existingFile = null;
    let newFile = null;
    let fileRemoved = false;


    function formatFileSize(bytes) {
        if (!bytes) return '';
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function renderFileStatus() {
        const list = document.getElementById('attachmentsList');
        if (!list) return;
        if (existingFile && !fileRemoved) {
            list.innerHTML = '<li>' +
                '<a href="' + existingFile.downloadUrl + '" download="' + existingFile.name + '">' + existingFile.name + (existingFile.size ? ' (' + formatFileSize(existingFile.size) + ')' : '') + '</a> ' +
                '<button type="button" class="btn-delete-small" onclick="removeExistingFile()">Eliminar</button>' +
                '</li>';
        } else if (newFile) {
            list.innerHTML = '<li>' +
                '<span>' + newFile.name + ' (' + formatFileSize(newFile.size) + ')</span> ' +
                '<button type="button" class="btn-delete-small" onclick="removeNewFile()">Eliminar</button>' +
                '</li>';
        } else {
            list.innerHTML = '';
        }
    }

    window.removeExistingFile = function() {
        fileRemoved = true;
        renderFileStatus();
    };

    window.removeNewFile = function() {
        newFile = null;
        renderFileStatus();
    };

    if (editTaskId) {
        (async () => {
            const task = await tasks_module.getTaskById(editTaskId);
            if (!task) {
                app.showAlert('Tarea no encontrada', 'error');
                app.navigate('tasks');
            } else {
                taskTitle.textContent = 'Editar Tarea';
                taskSubmit.textContent = 'Actualizar Tarea';
                document.getElementById('taskTitle').value = task.title || '';
                document.getElementById('taskCourse').value = String(task.courseId || '');
                document.getElementById('taskGroup').value = task.groupId ? String(task.groupId) : '';
                document.getElementById('taskDescription').value = task.description || '';
                document.getElementById('taskDueDate').value = task.dueDate ? task.dueDate.slice(0, 16) : '';
                if (task.tieneArchivo && task.downloadUrl) {
                    existingFile = { name: task.nombreArchivo, size: task.tamano, downloadUrl: task.downloadUrl };
                    renderFileStatus();
                }
            }
        })();
    }

    async function readFileAsBase64(file) {
        return new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = () => {
                const base64 = reader.result.split(',')[1];
                res({ name: file.name, type: file.type || 'application/octet-stream', size: file.size, data: base64 });
            };
            reader.onerror = () => rej(reader.error);
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('taskAttachments').addEventListener('change', async function() {
        const file = this.files && this.files[0];
        if (!file) return;
        try {
            newFile = await readFileAsBase64(file);
            fileRemoved = false;
            renderFileStatus();
            this.value = '';
        } catch (err) {
            console.error('Error leyendo archivo:', err);
            app.showAlert('Error al leer archivo adjunto', 'error');
        }
    });

    document.getElementById('createTaskForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const taskData = {
            title: document.getElementById('taskTitle').value,
            courseId: document.getElementById('taskCourse').value,
            groupId: document.getElementById('taskGroup').value || null,
            description: document.getElementById('taskDescription').value,
            dueDate: document.getElementById('taskDueDate').value,
        };

        try {
            if (editTaskId) {
                if (fileRemoved) {
                    taskData.eliminarArchivo = true;
                } else if (newFile) {
                    taskData.archivo = newFile;
                }
                if (fileRemoved || newFile || document.getElementById('taskTitle').value) {
                    await tasks_module.updateTask(editTaskId, taskData);
                }
                setTimeout(() => app.navigate('tasks'), 800);
            } else {
                taskData.archivo = newFile;
                await tasks_module.createTask(taskData);
            }
        } catch (err) {
            console.error('Error al guardar tarea:', err);
            app.showAlert('Error al procesar los datos', 'error');
        }
    });
</script>
