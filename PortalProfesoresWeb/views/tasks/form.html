<!-- Task Form View -->
<div class="dashboard-container">
    <div id="alertContainer"></div>

    <div class="form-container">
        <h2 id="taskFormTitle">Crear Nueva Tarea</h2>
        <form id="createTaskForm">
            <div class="form-group-custom">
                <label for="taskTitle">Título de la Tarea *</label>
                <input type="text" id="taskTitle" placeholder="Ej: Implementar algoritmo de ordenamiento" required>
            </div>

            <div class="form-group-custom">
                <label for="taskCourse">Curso *</label>
                <select id="taskCourse" required>
                    <option value="">Seleccionar curso</option>
                </select>
            </div>

            <div class="form-group-custom">
                <label for="taskGroup">Grupo</label>
                <select id="taskGroup">
                    <option value="">Todos los estudiantes del curso</option>
                </select>
            </div>

            <div class="form-group-custom">
                <label for="taskDescription">Descripción *</label>
                <textarea id="taskDescription" placeholder="Detalla los requisitos, objetivos y evaluación de la tarea" required></textarea>
            </div>

            <div class="form-group-custom">
                <label for="taskDueDate">Fecha de Vencimiento *</label>
                <input type="datetime-local" id="taskDueDate" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitTaskBtn">Crear Tarea</button>
                <button type="button" class="btn-cancel" onclick="app.navigate('tasks')">
                    <i class="fas fa-times"></i> Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const currentUser = auth.getCurrentUser();
    if (currentUser) {
        const userNameEl = document.getElementById('userName');
        if (userNameEl) userNameEl.textContent = currentUser.name;
        const navName = document.getElementById('navUserName');
        if (navName) navName.textContent = currentUser.name;
        const avatar = document.querySelector('.user-avatar');
        if (avatar) avatar.textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'P';
    }

    function loadCoursesForTaskSelect() {
        const courses = courses_module.getUserCourses();
        const select = document.getElementById('taskCourse');
        select.innerHTML = '<option value="">Seleccionar curso</option>' +
            courses.map(course => `<option value="${course.id}">${course.name}</option>`).join('');
    }

    function loadGroupsForTaskSelect() {
        const groups = groups_module.getUserGroups();
        const select = document.getElementById('taskGroup');
        select.innerHTML = '<option value="">Todos los estudiantes del curso</option>' +
            groups.map(group => `<option value="${group.id}">${group.name}</option>`).join('');
    }

    loadCoursesForTaskSelect();
    loadGroupsForTaskSelect();

    const editTaskId = app.currentParams ? parseInt(app.currentParams) : null;
    const taskTitle = document.getElementById('taskFormTitle');
    const taskSubmit = document.getElementById('submitTaskBtn');

    if (editTaskId) {
        const task = tasks_module.getTaskById(editTaskId);
        if (!task) {
            app.showAlert('Tarea no encontrada', 'error');
            app.navigate('tasks');
        } else {
            taskTitle.textContent = 'Editar Tarea';
            taskSubmit.textContent = 'Actualizar Tarea';
            document.getElementById('taskTitle').value = task.title || '';
            document.getElementById('taskCourse').value = String(task.courseId || '');
            document.getElementById('taskGroup').value = task.groupId ? String(task.groupId) : '';
            document.getElementById('taskDescription').value = task.description || '';
            document.getElementById('taskDueDate').value = task.dueDate ? task.dueDate.slice(0, 16) : '';
        }
    }

    document.getElementById('createTaskForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const taskData = {
            title: document.getElementById('taskTitle').value,
            courseId: document.getElementById('taskCourse').value,
            groupId: document.getElementById('taskGroup').value || null,
            description: document.getElementById('taskDescription').value,
            dueDate: document.getElementById('taskDueDate').value,
        };

        if (editTaskId) {
            tasks_module.updateTask(editTaskId, taskData);
            setTimeout(() => app.navigate('tasks'), 1000);
        } else {
            tasks_module.createTask(taskData);
        }
    });
</script>
