<!-- Tasks View -->
<div class="dashboard-container">
    <div id="alertContainer"></div>

    <div class="section-container">
        <div class="section-header">
            <h2>Tareas</h2>
            <button class="btn-primary-custom" onclick="app.navigate('create-task')">
                Nueva Tarea
            </button>
        </div>

        <div id="tasksFilterContainer" style="margin-bottom: 20px;">
            <label for="courseFilterTasks" style="font-weight: 600; margin-right: 10px;color: black;">Filtrar por Curso:</label>
            <select id="courseFilterTasks" style="padding: 8px 12px; border: 2px solid #a9adb3; border-radius: 6px;">
                <option value="">Todos los cursos</option>
            </select>
        </div>

        <div id="tasksListContainer">
            <div class="table-responsive-custom">
                <table class="table-custom" id="tasksTable">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Curso</th>
                            <th>Fecha Límite</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tasksTableBody">
                    </tbody>
                </table>
            </div>
            <div id="emptyTasksState" class="empty-state hidden">
                <h3>No hay tareas aún</h3>
            </div>
        </div>
    </div>
</div>

<script>
    const currentUser = auth.getCurrentUser();
    if (currentUser) {
        const userNameEl = document.getElementById('userName');
        if (userNameEl) userNameEl.textContent = currentUser.name;
        const navName = document.getElementById('navUserName');
        if (navName) navName.textContent = currentUser.name;
        const avatar = document.querySelector('.user-avatar');
        if (avatar) avatar.textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'P';
    }

    function getTaskStatus(dueDate) {
        const today = new Date();
        const due = new Date(dueDate);
        if (due < today) return 'Vencida';
        const daysLeft = Math.ceil((due - today) / (1000 * 60 * 60 * 24));
        if (daysLeft <= 3) return 'Próxima';
        return 'Activa';
    }

    function getStatusBadgeColor(status) {
        switch(status) {
            case 'Vencida': return '#ef4444';
            case 'Próxima': return '#f59e0b';
            case 'Activa': return '#10b981';
            default: return '#6366f1';
        }
    }

    async function loadTasks() {
        const filterCourseId = document.getElementById('courseFilterTasks').value;
        let allTasks = await tasks_module.getUserTasks();
        const tasks = filterCourseId
            ? allTasks.filter(t => t.courseId == filterCourseId)
            : allTasks;
        const tbody = document.getElementById('tasksTableBody');
        const emptyState = document.getElementById('emptyTasksState');

        if (tasks.length === 0) {
            tbody.innerHTML = '';
            emptyState.classList.remove('hidden');
        } else {
            emptyState.classList.add('hidden');
            tbody.innerHTML = tasks.map(task => {
                const status = getTaskStatus(task.dueDate);
                const statusColor = getStatusBadgeColor(status);
                return `
                    <tr>
                        <td>${task.title}</td>
                        <td>${task.courseName || 'N/A'}</td>
                        <td>${new Date(task.dueDate).toLocaleDateString('es-ES')}</td>
                        <td><span style="background-color: ${statusColor}20; color: ${statusColor}; padding: 4px 12px; border-radius: 20px; font-weight: 600;">${status}</span></td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn-edit" onclick="app.navigate('create-task', { id: ${task.id}, mode: 'edit' })">
                                    Editar
                                </button>
                                <button class="btn-delete" onclick="tasks_module.deleteTask(${task.id})">
                                    Eliminar
                                </button>
                                <button class="btn-view" onclick="app.navigate('task-detail', { id: ${task.id}, mode: 'view' })">
                                    Ver detalle
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }
    }

    async function loadCoursesFilter() {
        const courses = await courses_module.getUserCourses();
        const select = document.getElementById('courseFilterTasks');
        select.innerHTML = '<option value="">Todos los cursos</option>' +
            courses.map(course => `<option value="${course.id}">${course.name}</option>`).join('');
    }

    (async () => {
        await loadCoursesFilter();
        await loadTasks();
    })();

    document.getElementById('courseFilterTasks').addEventListener('change', function() {
        loadTasks();
    });
</script>
