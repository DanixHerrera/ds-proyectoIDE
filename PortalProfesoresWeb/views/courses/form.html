<!-- Course Form View -->
<div class="dashboard-container">
    <div id="alertContainer"></div>

    <div class="form-container">
        <h2 id="courseFormTitle">Crear Nuevo Curso</h2>
        <form id="createCourseForm">
            <div class="form-group-custom">
                <label for="courseName">Nombre del Curso *</label>
                <input type="text" id="courseName" placeholder="Ej: Introducción a Programación" required>
            </div>

            <div class="form-group-custom">
                <label for="courseCode">Código del Curso *</label>
                <input type="text" id="courseCode" placeholder="Ej: CS101" required>
            </div>

            <div class="form-group-custom">
                <label for="courseDescription">Descripción</label>
                <textarea id="courseDescription" placeholder="Describe el contenido y objetivos del curso"></textarea>
            </div>

            <div class="form-group-custom">
                <label for="courseSemester">Semestre/Período *</label>
                <input type="text" id="courseSemester" placeholder="Ej: 2024-1" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitCourseBtn">Crear Curso</button>
                <button type="button" class="btn-cancel" onclick="app.navigate('courses')"> Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const currentUser = auth.getCurrentUser();
    if (currentUser) {
        const userNameEl = document.getElementById('userName');
        if (userNameEl) userNameEl.textContent = currentUser.name;
        const navName = document.getElementById('navUserName');
        if (navName) navName.textContent = currentUser.name;
        const avatar = document.querySelector('.user-avatar');
        if (avatar) avatar.textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'P';
    }

    const editCourseId = app.currentParams ? parseInt(app.currentParams) : null;
    const courseTitle = document.getElementById('courseFormTitle');
    const courseSubmit = document.getElementById('submitCourseBtn');

    if (editCourseId) {
        const course = courses_module.getCourseById(editCourseId);
        if (!course) {
            app.showAlert('Curso no encontrado', 'error');
            app.navigate('courses');
        } else {
            courseTitle.textContent = 'Editar Curso';
            courseSubmit.textContent = 'Actualizar Curso';
            document.getElementById('courseName').value = course.name || '';
            document.getElementById('courseCode').value = course.code || '';
            document.getElementById('courseDescription').value = course.description || '';
            document.getElementById('courseSemester').value = course.semester || '';
        }
    }

    document.getElementById('createCourseForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const courseData = {
            name: document.getElementById('courseName').value,
            code: document.getElementById('courseCode').value,
            description: document.getElementById('courseDescription').value,
            semester: document.getElementById('courseSemester').value
        };

        if (editCourseId) {
            courses_module.updateCourse(editCourseId, courseData);
            setTimeout(() => app.navigate('courses'), 1000);
        } else {
            courses_module.createCourse(courseData);
        }
    });
</script>
