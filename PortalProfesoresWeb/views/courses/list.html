<!-- Courses View -->
<div class="dashboard-container">
    <div id="alertContainer"></div>

    <div class="section-container">
        <div class="section-header">
            <h2>Mis Cursos</h2>
            <button class="btn-primary-custom" onclick="app.navigate('create-course')">
                <i class="fas fa-plus"></i> Nuevo Curso
            </button>
        </div>

        <div id="coursesListContainer">
            <div class="table-responsive-custom">
                <table class="table-custom" id="coursesTable">
                    <thead>
                        <tr>
                            <th>Nombre del Curso</th>
                            <th>Código</th>
                            <th>Descripción</th>
                            <th>Estudiantes</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="coursesTableBody">
                    </tbody>
                </table>
            </div>
            <div id="emptyCoursesState" class="empty-state hidden">
                <h3>No hay cursos aún</h3>
            </div>
        </div>
    </div>
</div>

    <script>
    const currentUser = auth.getCurrentUser();
    if (currentUser) {
        const userNameEl = document.getElementById('userName');
        if (userNameEl) userNameEl.textContent = currentUser.name;
        const navName = document.getElementById('navUserName');
        if (navName) navName.textContent = currentUser.name;
        const avatar = document.querySelector('.user-avatar');
        if (avatar) avatar.textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'P';
    }

    function loadCourses() {
        const courses = courses_module.getUserCourses();
        const tbody = document.getElementById('coursesTableBody');
        const emptyState = document.getElementById('emptyCoursesState');

        if (courses.length === 0) {
            tbody.innerHTML = '';
            emptyState.classList.remove('hidden');
        } else {
            emptyState.classList.add('hidden');
            tbody.innerHTML = courses.map(course => `
                <tr>
                    <td><strong>${course.name}</strong></td>
                    <td>${course.code}</td>
                    <td>${course.description}</td>
                    <td>${course.studentCount || 0}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="app.navigate('course-detail', ${course.id})">
                                <i class="fas fa-eye"></i> Ver
                            </button>
                            <button class="btn-delete" onclick="courses_module.deleteCourse(${course.id})">
                                <i class="fas fa-trash"></i> Eliminar
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
    }

    loadCourses();
</script>
