<!-- Group Form View -->
<div class="dashboard-container">
    <div id="alertContainer"></div>

    <div class="form-container">
        <h2 id="groupFormTitle">Crear Nuevo Grupo</h2>
        <form id="createGroupForm">
            <div class="form-group-custom">
                <label for="groupName">Nombre del Grupo *</label>
                <input type="text" id="groupName" required>
            </div>

            <div class="form-group-custom">
                <label for="groupCourse">Curso *</label>
                <select id="groupCourse" required>
                    <option value="">Seleccionar curso</option>
                </select>
            </div>

            <div class="form-group-custom">
                <label for="groupDescription">Descripción</label>
                <textarea id="groupDescription" ></textarea>
            </div>

            <div class="form-group-custom">
                <label for="groupCapacity">Capacidad máxima de estudiantes*</label>
                <input type="number" id="groupCapacity" min="1" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit" id="submitGroupBtn">Crear Grupo</button>
                <button type="button" class="btn-cancel" onclick="app.navigate('groups')">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const currentUser = auth.getCurrentUser();
    if (currentUser) {
        const userNameEl = document.getElementById('userName');
        if (userNameEl) userNameEl.textContent = currentUser.name;
        const navName = document.getElementById('navUserName');
        if (navName) navName.textContent = currentUser.name;
        const avatar = document.querySelector('.user-avatar');
        if (avatar) avatar.textContent = currentUser.name ? currentUser.name.charAt(0).toUpperCase() : 'P';
    }

    async function loadCoursesForSelect() {
        const courses = await courses_module.getUserCourses();
        const select = document.getElementById('groupCourse');
        select.innerHTML = '<option value="">Seleccionar curso</option>' +
            courses.map(course => `<option value="${course.id}">${course.name}</option>`).join('');
    }

    (async () => {
        await loadCoursesForSelect();
    })();

    const groupParams = app.currentParams || null;
    const editGroupId = groupParams ? parseInt(groupParams.id || groupParams) : null;
    const groupTitle = document.getElementById('groupFormTitle');
    const groupSubmit = document.getElementById('submitGroupBtn');


    if (editGroupId) {
        (async () => {
            const group = await groups_module.getGroupById(editGroupId);
            if (!group) {
                app.showAlert('Grupo no encontrado', 'error');
                app.navigate('groups');
            } else {
                groupTitle.textContent = 'Editar Grupo';
                groupSubmit.textContent = 'Actualizar Grupo';
                document.getElementById('groupName').value = group.name || '';
                document.getElementById('groupCourse').value = String(group.courseId || '');
                document.getElementById('groupDescription').value = group.description || '';
                document.getElementById('groupCapacity').value = group.capacity || '';
            }
        })();
    }

    document.getElementById('createGroupForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const groupData = {
            name: document.getElementById('groupName').value,
            courseId: document.getElementById('groupCourse').value,
            description: document.getElementById('groupDescription').value,
            capacity: parseInt(document.getElementById('groupCapacity').value) || null
        };

        if (editGroupId) {
            await groups_module.updateGroup(editGroupId, groupData);
            setTimeout(() => app.navigate('groups'), 800);
        } else {
            await groups_module.createGroup(groupData);
        }
    });
</script>
