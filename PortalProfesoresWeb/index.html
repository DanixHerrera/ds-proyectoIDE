<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentIDE - Portal de Profesores</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
    <header>
        <nav class="navbar-app modern-nav nav-welcome">
            <div class="nav-left">
                <a class="navbar-brand" href="#" onclick="app.navigate('dashboard')">
                    <span class="brand-text">Portal de Profesores</span>
                </a>
            </div>
            <div class="nav-right">
                <div class="user-area">
                    <div class="user-avatar">P</div>
                    <div class="user-meta">
                        <div class="user-greet">Hola,</div>
                        <div id="navUserName" class="user-name">Profesor</div>
                    </div>
                    <button class="btn-logout" onclick="auth.logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <main id="app"></main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script src="services/storage.service.js"></script>
    <script src="models/user.model.js"></script>
    <script src="models/course.model.js"></script>
    <script src="models/group.model.js"></script>
    <script src="models/task.model.js"></script>
    <script src="services/api.service.js"></script>
    <script src="controllers/auth.controller.js"></script>
    <script src="controllers/course.controller.js"></script>
    <script src="controllers/group.controller.js"></script>
    <script src="controllers/task.controller.js"></script>
    <script src="controllers/app.controller.js"></script>
</body>
</html>
